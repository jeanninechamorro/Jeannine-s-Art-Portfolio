<body>
  <div id="flash-overlay"></div>
  <div id="intro-container">
    <img id="camera-img" src="img/Cameraflash.png" alt="Camera">
    </div>

  <header class="hero">
    <div class="welcome">
      <svg viewBox="0 0 500 120" class="curved-text">
       <path id="welcomeCurve" d="M50,100 Q250,10 450,100" fill="transparent" />
          <text>
            <textPath xlink:href="#welcomeCurve" startOffset="50%" text-anchor="middle">
              Welcome To
            </textPath>
           </text>
       </svg>
            
            <h2>Jeannine Chamorro's</h2>
            <h1>Art Portfolio</h1>

            <div class="clicktostartbutton">
                <a href="index.html" class="cta-button" onclick="triggerSequence(event)">Click to Start</a>
            </div>
        </div>
        <div id="intro-container">
    <picture>
        <source media="(max-width: 768px)" srcset="img/cameraframephotoscreen.png">
        <img id="camera-img" src="img/Cameraflash.png" alt="Camera">
    </picture>
    <div id="intro-container">
    <picture>
      <!-- Desktop: Above 767px (using your 1600w image) -->
      <source 
          media="(min-width: 768px)" 
          srcset="img/Cameraflash-1600.png"
          sizes="200vw">

      <!-- Mobile: 767px and below -->
      <img id="camera-img" 
          src="img/cameraframephonescreen.png" 
          srcset="img/camera-mobile-480.png 480w, 
                  img/Cameraflash-800.png 800w"
          sizes="(max-width: 600px) 100vw, 100vw"
          alt="Camera">
    </picture>
</div>
</div>
    </header>

    <script>
        function triggerSequence(event) {
            if (event) event.preventDefault();

            const flash = document.getElementById('flash-overlay');
            const img = document.getElementById('camera-img');

            img.classList.add('zooming');
            img.style.opacity = '1';

            setTimeout(() => {
                flash.classList.add('active');
                setTimeout(() => {
                    window.location.href = "index.html"; 
                }, 400); 

            }, 1000); 
        }
    </script>
</body>
